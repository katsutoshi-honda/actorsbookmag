name: Fetch Films Daily

on:
  schedule:
    # 毎日 06:00 JST (= 21:00 UTC 前日) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml google-generativeai

      - name: Fetch films and generate comments
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_films.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/films.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update films data $(date -u +%Y-%m-%d)"
            git push
          fi
