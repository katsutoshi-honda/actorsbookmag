name: Fetch Streaming Films

on:
  schedule:
    # 毎朝06:17 JST (UTC 21:17)
    - cron: "17 21 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml anthropic playwright Pillow --break-system-packages
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch films
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/fetch_films.py

      - name: Generate banners
        run: |
          python scripts/generate_banners.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/films.json data/banners/
          git diff --staged --quiet || git commit -m "chore: update films and banners [skip ci]"
          git push
